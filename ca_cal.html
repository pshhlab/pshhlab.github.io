    /* =======================================================
       FIXED A4 AUTO SCALE
    ======================================================= */

    function scaleA4Page() {

      const page =
        document.querySelector(".a4-page");

      const wrapper =
        document.querySelector(".page-wrapper");

      const screenWidth =
        window.innerWidth - 40;

      const screenHeight =
        window.innerHeight - 40;

      const scaleX =
        screenWidth / 794;

      const scaleY =
        screenHeight / 1123;

      const scale =
        Math.min(scaleX, scaleY, 1);

      page.style.transform =
        `scale(${scale})`;

      wrapper.style.height =
        `${1123 * scale + 40}px`;
    }

    window.addEventListener(
      "resize",
      scaleA4Page
    );

    scaleA4Page();

  </script>


<!-- CA analysis -->
<script>

const STANDARD_BW = [1.4,3,5,10,15,20];

function getClassData(){

    const pairs = [];

    for(let a of STANDARD_BW){
        for(let b of STANDARD_BW){
            pairs.push([a,b]);
        }
    }

    return {
        A: STANDARD_BW.map(bw => [bw]),

        B: [
            ...STANDARD_BW.map(bw => [bw]),
            ...pairs.filter(p => p[0]+p[1] <= 20)
        ],

        C: pairs.filter(
            p => p[0]+p[1] > 20 &&
                 p[0]+p[1] <= 40
        )
    };
}

function cartesian(arrays){

    return arrays.reduce(
        (acc,curr)=>
            acc.flatMap(a =>
                curr.map(b => [...a,b])
            ),
        [[]]
    );
}

function analyzeCA(){

    const caInput =
        document.getElementById("caInput")
        .value
        .toUpperCase();

    const maxCC =
        parseInt(
            document.getElementById("maxCC").value
        );

    const maxBW =
        parseFloat(
            document.getElementById("maxBW").value
        );

    const data = getClassData();

    const matches =
        [...caInput.matchAll(/(\d+)([ABC])/g)];

    if(matches.length === 0){

        document.getElementById("output").innerHTML =
            "<b>Invalid CA Configuration</b>";

        return;
    }

    const bandOptions =
        matches.map(m => data[m[2]]);

    const rawCombos =
        cartesian(bandOptions);

    const valid =
        rawCombos.filter(combo => {

            const totalCC =
                combo.reduce(
                    (s,x)=>s+x.length,
                    0
                );

            const totalBW =
                combo.reduce(
                    (s,x)=>
                        s + x.reduce(
                            (a,b)=>a+b,
                            0
                        ),
                    0
                );

            return totalCC <= maxCC &&
                   totalBW <= maxBW;
        });

    let html = "";

    html += `<h2>CA Analysis Report</h2>`;

    if(valid.length === 0){

        html += `
        <p style="color:red">
        No valid carrier allocation found.
        </p>`;

        document.getElementById("output").innerHTML =
            html;

        return;
    }

    const structures = {};

    valid.forEach(v => {

        const key =
            v.map(x => x.length)
             .join("-");

        if(!structures[key]){
            structures[key] = [];
        }

        structures[key].push(v);
    });

    const sortedKeys =
        Object.keys(structures)
              .sort((a,b) => {

            const sumA =
                a.split("-")
                 .reduce(
                    (s,x)=>s+Number(x),
                    0
                 );

            const sumB =
                b.split("-")
                 .reduce(
                    (s,x)=>s+Number(x),
                    0
                 );

            return sumA - sumB;
        });

    for(const key of sortedKeys){

        const combos =
            structures[key];

        const struct =
            key.split("-")
               .map(Number);

        const bandCounts = [];

        for(let i=0;i<struct.length;i++){

            const unique =
                new Set(
                    combos.map(
                        c => JSON.stringify(c[i])
                    )
                );

            bandCounts.push(
                unique.size
            );
        }

        const subtotal =
            bandCounts.reduce(
                (a,b)=>a*b,
                1
            );

        const validCombinations =
            combos.length;

        const reductionRatio =
            subtotal > 0
            ? (
                validCombinations /
                subtotal *
                100
              ).toFixed(2)
            : "0.00";

        html += `
        <div class="result-card">
        <b>CC aggregation:</b>
        ${struct.map(
            x => `${x}CC`
        ).join(" + ")}
        <br><br>`;

        bandCounts.forEach(
            (count,i) => {

            html += `
            Band ${matches[i][1]}
            (Class ${matches[i][2]})
            : ${count} feasible cases
            <br>`;
        });

        html += `
        <br>
        Total feasible cases:
        ${bandCounts.join(" × ")}
        = ${subtotal}
        <br>
        Valid CC aggregation:
        ${validCombinations}
        </div>`;
    }

    html += `
    <h3>
    </br>
    TOTAL VALID CC AGGREGATION:
    ${valid.length}
    </h3>`;

    document.getElementById("output").innerHTML =
        html;
}

analyzeCA();

</script>
